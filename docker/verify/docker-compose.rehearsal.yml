services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 30

  rehearsal:
    build:
      context: ../..
      dockerfile: docker/verify/Dockerfile.rehearsal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
